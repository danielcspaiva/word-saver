<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#000"/>
  <!-- 4x4 grid of dots, some "lit" to suggest the word clock -->
  <!-- Row 1: IT -->
  <rect x="6" y="6" width="4" height="4" rx="0.5" fill="#fff"/>
  <rect x="14" y="6" width="4" height="4" rx="0.5" fill="#fff"/>
  <rect x="22" y="6" width="4" height="4" rx="0.5" fill="#333"/>
  <!-- Row 2 -->
  <rect x="6" y="13" width="4" height="4" rx="0.5" fill="#333"/>
  <rect x="14" y="13" width="4" height="4" rx="0.5" fill="#333"/>
  <rect x="22" y="13" width="4" height="4" rx="0.5" fill="#fff"/>
  <!-- Row 3 -->
  <rect x="6" y="20" width="4" height="4" rx="0.5" fill="#333"/>
  <rect x="14" y="20" width="4" height="4" rx="0.5" fill="#fff"/>
  <rect x="22" y="20" width="4" height="4" rx="0.5" fill="#fff"/>
</svg>
